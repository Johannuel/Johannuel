  <path d="M150 234C246 174 322 160 416 174" stroke="#FFFFFF" stroke-opacity="0.09" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M1126 216C1208 250 1282 280 1388 302" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2.5" stroke-linecap="round"/>

  <path d="M98 386L270 364L262 402L90 426Z" fill="url(#chrome)" fill-opacity="0.92"/>
  <path d="M286 350L430 340L418 390L274 402Z" fill="#EAF0F7" fill-opacity="0.16"/>
  <path d="M1330 154L1458 132L1470 180L1342 202Z" fill="#EAF0F7" fill-opacity="0.14"/>
  <path d="M1240 126L1336 116L1328 160L1230 172Z" fill="url(#chrome)" fill-opacity="0.7"/>
  <path d="M220 470C280 430 334 418 384 422C338 448 292 478 214 492Z" fill="#FF77D6" fill-opacity="0.15"/>
  <path d="M1040 460C1120 414 1200 394 1286 400C1206 432 1146 460 1050 490Z" fill="#C6FF2A" fill-opacity="0.12"/>
