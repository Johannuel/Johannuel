  <ellipse cx="1280" cy="116" rx="240" ry="88" fill="#C6FF2A" fill-opacity="0.12" filter="url(#blur)"/>
  <ellipse cx="820" cy="460" rx="360" ry="72" fill="#FFFFFF" fill-opacity="0.05" filter="url(#blur)"/>
  <ellipse cx="820" cy="260" rx="120" ry="120" fill="#FF77D6" fill-opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="1240" cy="330" rx="160" ry="76" fill="#FF2E88" fill-opacity="0.08" filter="url(#blur)"/>

