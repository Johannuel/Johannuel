<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Johannuel profile banner</title>
  <desc id="desc">Dark, futuristic profile banner with Y2K sports-inspired accents.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="20" x2="1480" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06040A"/>
      <stop offset="0.36" stop-color="#1A0820"/>
      <stop offset="0.68" stop-color="#3B0E32"/>
      <stop offset="1" stop-color="#6B1330"/>
    </linearGradient>
    <linearGradient id="accent" x1="220" y1="150" x2="1380" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5F7FA" stop-opacity="0.96"/>
      <stop offset="0.18" stop-color="#FF77D6" stop-opacity="0.95"/>
      <stop offset="0.44" stop-color="#FF2E88" stop-opacity="0.98"/>
      <stop offset="0.68" stop-color="#C6FF2A" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#F5F7FA" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#27142D" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#0A0B10" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="chrome" x1="260" y1="0" x2="1440" y2="0">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.2" stop-color="#DCE2EA"/>
      <stop offset="0.42" stop-color="#8F99AA"/>
      <stop offset="0.62" stop-color="#FFFFFF"/>
      <stop offset="0.82" stop-color="#B6C0D1"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse">
      <path d="M 58 0 H 0 V 58" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="2" fill="#FFFFFF" fill-opacity="0.08"/>
      <circle cx="28" cy="14" r="1.8" fill="#FF77D6" fill-opacity="0.08"/>
      <circle cx="16" cy="30" r="1.6" fill="#C6FF2A" fill-opacity="0.08"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="36" fill="url(#bg)"/>
  <rect width="1600" height="520" rx="36" fill="url(#grid)"/>
  <rect width="1600" height="520" rx="36" fill="url(#dots)"/>

