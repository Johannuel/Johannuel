  <path d="M82 390C330 258 496 224 736 232C928 238 1064 210 1218 138C1338 82 1436 76 1548 102" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M118 420C358 320 516 294 736 300C920 304 1072 276 1226 206" stroke="#FF77D6" stroke-opacity="0.34" stroke-width="6" stroke-linecap="round"/>
